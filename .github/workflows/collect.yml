name: Collect Real Estate Data

on:
  schedule:
    - cron: "0 15 * * *"    # 매일 자정 (KST = UTC+9)
  workflow_dispatch:         # 수동 실행 가능
    inputs:
      months:
        description: "수집할 개월 수 (기본 1, 초기 수집 시 60)"
        default: "1"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect transaction data
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MONTHS: ${{ github.event.inputs.months || '1' }}
        run: python scripts/collect_data.py

      - name: Run hypothesis tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: cd scripts && python run_hypothesis.py
